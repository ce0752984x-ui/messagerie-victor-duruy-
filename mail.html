<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Messagerie — CLG Victor Duruy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/identite.css" />
<link rel="stylesheet" href="css/mail.css" />
</head>
<body>

<div class="app-mail">

  <!-- ===== Barre latérale ===== -->
  <aside class="barre-laterale-mail">
    <div class="logo-admin">
      <div class="cachet" style="width:34px;height:34px;color:var(--craie);">
        <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="60" cy="60" r="56" stroke="currentColor" stroke-width="3" stroke-dasharray="2 5"/>
          <circle cx="60" cy="60" r="46" stroke="currentColor" stroke-width="2"/>
        </svg>
      </div>
      <div>
        <strong>Messagerie</strong>
        <span>CLG Victor Duruy</span>
      </div>
    </div>

    <button class="btn btn-craie" id="bouton-nouveau-message" style="margin: 1.2em 0;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouveau message
    </button>

    <nav class="nav-admin">
      <button class="nav-item actif" data-dossier="reception">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
        Boîte de réception
        <span class="compteur-non-lus" id="compteur-non-lus" hidden>0</span>
      </button>
      <button class="nav-item" data-dossier="envoyes">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Envoyés
      </button>
      <button class="nav-item" data-dossier="brouillons">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Brouillons
      </button>
    </nav>

    <div class="bas-barre-laterale">
      <a href="admin.html" class="nav-item masquee" id="lien-vers-admin">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Espace administration
      </a>
      <button class="nav-item" id="bouton-deconnexion">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Se déconnecter
      </button>
    </div>
  </aside>

  <!-- ===== Liste des messages ===== -->
  <section class="liste-messages">
    <header class="entete-liste">
      <h1 id="titre-dossier">Boîte de réception</h1>
      <div class="champ-recherche" style="max-width:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="recherche-mail" placeholder="Rechercher..." />
      </div>
    </header>
    <div id="conteneur-liste-messages" class="conteneur-liste-messages">
      <div class="chargement-ligne" style="height:64px;margin:10px;"></div>
      <div class="chargement-ligne" style="height:64px;margin:10px;"></div>
      <div class="chargement-ligne" style="height:64px;margin:10px;"></div>
    </div>
  </section>

  <!-- ===== Lecture du message ===== -->
  <section class="lecture-message" id="zone-lecture">
    <div class="etat-vide" style="height:100%;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 6l-10 7L2 6"/></svg>
      <h3>Sélectionne un message</h3>
      <p>Choisis un message dans la liste pour l'afficher ici.</p>
    </div>
  </section>

</div>

<!-- ===== Panneau de composition (nouveau message / réponse / brouillon) ===== -->
<div class="fond-modale masquee" id="fond-composition">
  <div class="panneau-composition">
    <div class="modale-entete">
      <h2 id="titre-composition">Nouveau message</h2>
      <button class="btn-icone" id="fermer-composition">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <form id="formulaire-composition" class="formulaire-vertical">
      <input type="hidden" id="brouillon-id-edition" value="" />

      <div class="champ champ-destinataire">
        <label for="champ-destinataire-saisie">Destinataire</label>
        <input type="text" id="champ-destinataire-saisie" placeholder="Tape un nom, une classe ou une fonction..." autocomplete="off" />
        <input type="hidden" id="destinataire-uid" />
        <div id="suggestions-destinataire" class="suggestions-destinataire" hidden></div>
        <div id="destinataire-choisi" class="destinataire-choisi" hidden></div>
      </div>

      <div class="champ">
        <label for="champ-objet">Objet</label>
        <input type="text" id="champ-objet" placeholder="Objet du message" />
      </div>

      <div class="champ" style="flex:1;">
        <label for="champ-contenu">Message</label>
        <textarea id="champ-contenu" placeholder="Écris ton message ici..." style="min-height:240px; flex:1;"></textarea>
      </div>

      <div id="message-erreur-composition" class="message-erreur" hidden></div>

      <div class="actions-modale" style="justify-content:space-between;">
        <button type="button" class="btn btn-secondaire" id="bouton-enregistrer-brouillon">Enregistrer le brouillon</button>
        <button type="submit" class="btn btn-principal" id="bouton-envoyer-message">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Envoyer
        </button>
      </div>
    </form>
  </div>
</div>

<div class="toast-zone" id="toast-zone"></div>

<script type="module" src="js/mail.js"></script>
</body>
</html>
